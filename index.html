<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoccerStats | Home</title>
   <!-- Author: Isaac Sanchez  -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Header / Nav -->
  <header class="site-header">
    <div class="brand">
      <img class="brand-logo" src="images/logo.png" alt="SoccerStats logo" />
      <span class="brand-name">SoccerStats</span>
    </div>

    <nav class="top-nav" aria-label="Primary">
      <a class="nav-link active" href="index.html" aria-current="page">Home</a>
      <a class="nav-link" href="team-stats.html">Team Stats</a>
      <a class="nav-link" href="player-stats.html">Player Stats</a>
      <a class="nav-link" href="compare.html">Compare Players</a>
      <a class="nav-link" href="contact.html">Contact Us</a>

      <div class="nav-actions">
        <a class="btn btn-ghost" href="signin.html">Sign in</a>
        <a class="btn btn-solid" href="register.html">Register</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <h1 class="page-title">Home</h1>

    <section class="content" aria-label="Home content">
      <!-- Teams -->
      <div class="column">
        <div class="section-head">
          <h2>Teams</h2>
          <p class="muted">Search team</p>
        </div>

        <section class="teams-grid" aria-label="La Liga team logos">
          <img class="team-logo" src="images/teams/barcelona.png" alt="FC Barcelona" />
          <img class="team-logo" src="images/teams/realmadrid.png" alt="Real Madrid" />
          <img class="team-logo" src="images/teams/atletico.png" alt="Atlético de Madrid" />

          <img class="team-logo" src="images/teams/sevilla.png" alt="Sevilla FC" />
          <img class="team-logo" src="images/teams/valencia.png" alt="Valencia CF" />
          <img class="team-logo" src="images/teams/villarreal.png" alt="Villarreal CF" />

          <img class="team-logo" src="images/teams/realsociedad.png" alt="Real Sociedad" />
          <img class="team-logo" src="images/teams/athleticclub.png" alt="Athletic Club" />
          <img class="team-logo" src="images/teams/girona.png" alt="Girona FC" />
        </section>
      </div>

      <!-- Players -->
      <div class="column">
        <div class="section-head">
          <h2>Players</h2>
          <p class="muted">Search Players</p>
        </div>

        <section class="players-grid" aria-label="Active La Liga players">
          <img class="player-img" src="images/players/mbappe.jpg" alt="Kylian Mbappé" />
          <img class="player-img" src="images/players/vinicius.jpg" alt="Vinícius Júnior" />
          <img class="player-img" src="images/players/bellingham.jpg" alt="Jude Bellingham" />

          <img class="player-img" src="images/players/pedri.jpg" alt="Pedri" />
          <img class="player-img" src="images/players/gavi.jpg" alt="Gavi" />
          <img class="player-img" src="images/players/olmo.jpg" alt="Dani Olmo" />
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-left" aria-label="Social links">
      <a class="social" href="#" aria-label="X">X</a>
      <a class="social" href="#" aria-label="Instagram">◎</a>
      <a class="social" href="#" aria-label="YouTube">▶</a>
      <a class="social" href="#" aria-label="LinkedIn">in</a>
    </nav>

    <div class="footer-links">
      <a href="#" class="footer-link">Explore</a>
      <a href="#" class="footer-link">Resources</a>
    </div>

    <div class="footer-right" aria-hidden="true"></div>
  </footer>
</body>
</html>
