<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoccerStats | Contact Us</title>
   <!-- Author: Isaac Sanchez  -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="brand">
      <img class="brand-logo" src="images/logo.png" alt="SoccerStats logo" />
      <span class="brand-name">SoccerStats</span>
    </div>

    <nav class="top-nav" aria-label="Primary">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="team-stats.html">Team Stats</a>
      <a class="nav-link" href="player-stats.html">Player Stats</a>
      <a class="nav-link" href="compare.html">Compare Players</a>
      <a class="nav-link active" href="contact.html" aria-current="page">Contact Us</a>

      <div class="nav-actions">
        <a class="btn btn-ghost" href="signin.html">Sign in</a>
        <a class="btn btn-solid" href="register.html">Register</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <h1 class="page-title">Contact Us</h1>
    <p class="page-subtitle">Feedback is Appreciated</p>

    <section class="contact-wrap" aria-label="Contact form section">
      <form class="contact-card" action="#" method="post">
        <div class="form-group">
          <label class="form-label" for="firstName">Name</label>
          <input class="form-input" id="firstName" name="firstName" type="text" placeholder="Value" />
        </div>

        <div class="form-group">
          <label class="form-label" for="lastName">Surname</label>
          <input class="form-input" id="lastName" name="lastName" type="text" placeholder="Value" />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" id="email" name="email" type="email" placeholder="Value" />
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Message</label>
          <textarea class="form-textarea" id="message" name="message" rows="4" placeholder="Value"></textarea>
        </div>

        <button class="form-submit" type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-left" aria-label="Social links">
      <a class="social" href="#" aria-label="X">X</a>
      <a class="social" href="#" aria-label="Instagram">◎</a>
      <a class="social" href="#" aria-label="YouTube">▶</a>
      <a class="social" href="#" aria-label="LinkedIn">in</a>
    </nav>

    <div class="footer-links">
      <a href="#" class="footer-link">Explore</a>
      <a href="#" class="footer-link">Resources</a>
    </div>

    <div class="footer-right" aria-hidden="true"></div>
  </footer>
</body>
</html>
